name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: date_planner
          POSTGRES_USER: date_planner
          POSTGRES_PASSWORD: ci-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U date_planner -d date_planner"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_DB: date_planner
      POSTGRES_USER: date_planner
      POSTGRES_PASSWORD: ci-only-password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY: ci-only-not-a-production-secret
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run Ruff
        run: ruff check .
      - name: Check Ruff formatting
        run: ruff format --check .
      - name: Run Django system checks
        run: python manage.py check
      - name: Check migration drift
        run: python manage.py makemigrations --check --dry-run
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Validate OpenAPI schema
        run: python manage.py spectacular --file /tmp/date-planner-schema.yaml --validate
      - name: Run backend tests with coverage
        run: >-
          pytest
          --cov=apps.common
          --cov-config=pyproject.toml
          --cov-report=term-missing:skip-covered
          --cov-report=xml:coverage.xml
          --cov-report=html:htmlcov
      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/htmlcov
          if-no-files-found: ignore

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Check TypeScript
        run: npm run typecheck
      - name: Build frontend
        env:
          NUXT_PUBLIC_API_BASE_URL: http://localhost:8000
        run: npm run build
      - name: Run frontend tests with coverage
        run: npm run test:coverage
      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: ignore
