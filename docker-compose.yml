services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-date_planner}
      POSTGRES_USER: ${POSTGRES_USER:-date_planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-date_planner_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-date_planner}
      POSTGRES_USER: ${POSTGRES_USER:-date_planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-date_planner_dev_password}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-change-me-before-deploying}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      DRF_THROTTLE_ANON_RATE: ${DRF_THROTTLE_ANON_RATE:-60/min}
      DRF_THROTTLE_USER_RATE: ${DRF_THROTTLE_USER_RATE:-120/min}
      DRF_THROTTLE_CREATE_RATE: ${DRF_THROTTLE_CREATE_RATE:-10/min}
      DRF_THROTTLE_RESPONSE_RATE: ${DRF_THROTTLE_RESPONSE_RATE:-20/min}
      DRF_THROTTLE_PLAN_RATE: ${DRF_THROTTLE_PLAN_RATE:-20/min}
      DRF_NUM_PROXIES: ${DRF_NUM_PROXIES:-0}
      DRF_THROTTLE_CACHE_LOCATION: ${DRF_THROTTLE_CACHE_LOCATION:-/tmp/date-planner-throttle-cache}
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/', timeout=2)
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    environment:
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_nuxt:/app/.nuxt
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_nuxt:
